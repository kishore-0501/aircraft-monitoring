<!DOCTYPE html>
<html>
<head>

<title>Aircraft Engine Monitoring</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/raphael/raphael.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/justgage"></script>

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.navbar{
background:#1f4e79;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.chart-card{
height:260px;
}

.gauge{
height:200px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark px-4">
<span class="navbar-brand">Aircraft Engine Monitoring</span>
</nav>

<div class="container mt-4">

<div class="row g-3">


<!-- Temperature Chart -->

<div class="col-md-6">
<div class="card chart-card p-3">
<h6>Engine Temperature</h6>
<canvas id="temperatureChart"></canvas>
</div>
</div>

<!-- RPM Chart -->

<div class="col-md-6">
<div class="card chart-card p-3">
<h6>Engine RPM</h6>
<canvas id="rpmChart"></canvas>
</div>
</div>

<!-- Gauges -->

<div class="col-md-6">
<div class="card p-3 text-center">
<h6>Engine Load</h6>
<div id="loadGauge" class="gauge"></div>
</div>
</div>

<div class="col-md-6">
<div class="card p-3 text-center">
<h6>Vibration Level</h6>
<div id="vibrationGauge" class="gauge"></div>
</div>
</div>

<!-- Bar Charts -->

<div class="col-md-6">
<div class="card p-3">
<h6>Fuel Flow</h6>
<canvas id="fuelChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<h6>Pressure</h6>
<canvas id="pressureChart"></canvas>
</div>
</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
